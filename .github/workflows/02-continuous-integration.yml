# ==============================================================================
# Workflow 02 — Continuous Integration (CI)
#
# PURPOSE: This is the CORE of CI. Every time someone pushes code or opens a
# pull request, automatically verify that:
#   1. The code compiles (no syntax errors)
#   2. All tests pass
#   3. Nobody broke anything
#
# This is the workflow that gives developers confidence to merge quickly.
#
# KEY CONCEPTS:
#   - actions/checkout      → Clones the repo onto the runner
#   - actions/setup-go      → Installs Go on the runner
#   - Branch protection     → Require this check to pass before merging a PR
#   - Job outputs & status  → Green ✅ or red ❌ on the PR page
# ==============================================================================

name: 02 · Continuous Integration

on:
  push:
    #branches: [main] # Run on every push to main
  pull_request: # Run on every pull request (any branch)
  workflow_dispatch:

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Get the code ────────────────────────────────────────────────
      # The runner starts with an EMPTY workspace. This action clones your
      # repository so the following steps can access your code.
      - name: Checkout repository
        uses: actions/checkout@v7

      # ── Step 2: Install Go ──────────────────────────────────────────────────
      # The runner has many tools pre-installed, but we pin the Go version
      # so our CI always uses the same version as our go.mod specifies.
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod # Reads the version from go.mod automatically

      # ── Step 3: Verify dependencies ─────────────────────────────────────────
      # `go mod verify` checks that the module cache matches the checksums
      # in go.sum — protects against supply-chain tampering.
      - name: Verify dependencies
        run: go mod verify

      # ── Step 4: Compile ─────────────────────────────────────────────────────
      # `go build` catches compilation errors BEFORE running tests.
      # The ./... pattern means "all packages in this module".
      - name: Build
        run: go build ./...

      # ── Step 5: Run tests ───────────────────────────────────────────────────
      # -race detects data races in concurrent code.
      # -count=1 disables test result caching (always re-run).
      # These are the DB-free unit tests (the `integration` build tag is off).
      - name: Run tests
        run: go test -race -count=1 ./...

  # ── Integration tests ───────────────────────────────────────────────────────
  # Tests tagged `//go:build integration` run against a REAL Postgres so the
  # repository SQL is validated against the actual schema (migrations/up.sql).
  # They are skipped by the unit job above and only run here, where a disposable
  # Postgres service is available via TEST_DATABASE_URL.
  integration:
    name: Integration tests (Postgres)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        # Wait until Postgres is ready before starting the steps.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run integration tests
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable
        run: go test -tags integration -count=1 ./...
