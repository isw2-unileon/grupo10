services:
  db:
    image: postgres:17-alpine
    container_name: learning_platform_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-learning_platform}
    ports:
      - "${DB_PORT_HOST:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    networks:
      - platform_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-learning_platform}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backup:
    image: postgres:17-alpine
    container_name: learning_platform_backup
    volumes:
      - ./backups:/backups
    environment:
      PGPASSWORD: ${DB_PASSWORD:-password}
      DB_USER: ${DB_USER:-user}
      DB_NAME: ${DB_NAME:-learning_platform}
    networks:
      - platform_network
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c '
      while true; do
        echo "Starting daily backup..."
        pg_dump -h db -U $$DB_USER -d $$DB_NAME -F c -f /backups/backup_$$(date +%Y%m%d_%H%M%S).dump
        find /backups -name "backup_*.dump" -mtime +6 -delete
        sleep 86400
      done'

  server:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: learning_platform_server
    env_file:
      - .env
    ports:
      - "${SERVER_PORT_HOST:-8080}:8080"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgres://${DB_USER:-user}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-learning_platform}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:-dev-insecure-secret}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - platform_network

networks:
  platform_network:
    driver: bridge

volumes:
  postgres_data: